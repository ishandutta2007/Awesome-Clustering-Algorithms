<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c20" />
      <stop offset="50%" stop-color="#151035" />
      <stop offset="100%" stop-color="#070514" />
    </linearGradient>

    <!-- Node Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradients for Clusters -->
    <radialGradient id="cluster1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="cluster2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="cluster3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7000ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#7000ff" stop-opacity="0" />
    </radialGradient>

    <!-- Styles for animation -->
    <style>
      @keyframes float {
        0% { transform: translateY(0px) translateX(0px); }
        50% { transform: translateY(-10px) translateX(5px); }
        100% { transform: translateY(0px) translateX(0px); }
      }
      @keyframes pulse {
        0% { opacity: 0.3; }
        50% { opacity: 0.8; }
        100% { opacity: 0.3; }
      }
      @keyframes dash {
        to {
          stroke-dashoffset: -40;
        }
      }
      .node-group-1 { animation: float 6s ease-in-out infinite; }
      .node-group-2 { animation: float 8s ease-in-out infinite alternate; }
      .node-group-3 { animation: float 7s ease-in-out infinite 1s; }
      .glow-ring { animation: pulse 3s ease-in-out infinite; }
      .connecting-line {
        stroke-dasharray: 8, 4;
        animation: dash 5s linear infinite;
      }
      .title-text {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        fill: #ffffff;
        letter-spacing: 2px;
      }
      .subtitle-text {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 400;
        fill: #a0aec0;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.05">
    <path d="M 0,40 L 1200,40 M 0,80 L 1200,80 M 0,120 L 1200,120 M 0,160 L 1200,160 M 0,200 L 1200,200 M 0,240 L 1200,240 M 0,280 L 1200,280 M 0,320 L 1200,320 M 0,360 L 1200,360" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Animated Cluster Backgrounds (Glows) -->
  <circle cx="200" cy="200" r="180" fill="url(#cluster1)" class="glow-ring" />
  <circle cx="1000" cy="180" r="160" fill="url(#cluster2)" class="glow-ring" style="animation-delay: 1.5s;" />
  <circle cx="600" cy="300" r="130" fill="url(#cluster3)" class="glow-ring" style="animation-delay: 0.7s;" />

  <!-- Connecting Lines -->
  <!-- Left Cluster Connections -->
  <g stroke="#ff007f" stroke-width="1.5" opacity="0.4" class="node-group-1">
    <line x1="150" y1="130" x2="250" y2="120" />
    <line x1="250" y1="120" x2="280" y2="220" />
    <line x1="280" y1="220" x2="180" y2="270" />
    <line x1="180" y1="270" x2="110" y2="200" />
    <line x1="110" y1="200" x2="150" y2="130" />
    <line x1="150" y1="130" x2="180" y2="270" />
    <line x1="250" y1="120" x2="180" y2="270" />
  </g>

  <!-- Right Cluster Connections -->
  <g stroke="#00f0ff" stroke-width="1.5" opacity="0.4" class="node-group-2">
    <line x1="950" y1="120" x2="1050" y2="110" />
    <line x1="1050" y1="110" x2="1080" y2="200" />
    <line x1="1080" y1="200" x2="980" y2="250" />
    <line x1="980" y1="250" x2="910" y2="180" />
    <line x1="910" y1="180" x2="950" y2="120" />
    <line x1="950" y1="120" x2="980" y2="250" />
  </g>

  <!-- Central Cluster Connections -->
  <g stroke="#7000ff" stroke-width="1.5" opacity="0.4" class="node-group-3">
    <line x1="560" y1="250" x2="640" y2="240" />
    <line x1="640" y1="240" x2="660" y2="310" />
    <line x1="660" y1="310" x2="580" y2="330" />
    <line x1="580" y1="330" x2="560" y2="250" />
  </g>

  <!-- Inter-cluster Neural Paths (Dashed) -->
  <path d="M 280,220 Q 420,180 560,250" fill="none" stroke="#7000ff" stroke-width="2" opacity="0.3" class="connecting-line" />
  <path d="M 640,240 Q 800,160 910,180" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.3" class="connecting-line" />

  <!-- Nodes (Left) -->
  <g class="node-group-1" filter="url(#glow)">
    <circle cx="150" cy="130" r="7" fill="#ff007f" />
    <circle cx="250" cy="120" r="9" fill="#ff5eaf" />
    <circle cx="280" cy="220" r="8" fill="#ff007f" />
    <circle cx="180" cy="270" r="10" fill="#ff99cf" />
    <circle cx="110" cy="200" r="6" fill="#ff007f" />
  </g>

  <!-- Nodes (Right) -->
  <g class="node-group-2" filter="url(#glow)">
    <circle cx="950" cy="120" r="8" fill="#00f0ff" />
    <circle cx="1050" cy="110" r="6" fill="#00f0ff" />
    <circle cx="1080" cy="200" r="9" fill="#80f7ff" />
    <circle cx="980" cy="250" r="7" fill="#00f0ff" />
    <circle cx="910" cy="180" r="10" fill="#b3fbff" />
  </g>

  <!-- Nodes (Center-Bottom) -->
  <g class="node-group-3" filter="url(#glow)">
    <circle cx="560" cy="250" r="8" fill="#7000ff" />
    <circle cx="640" cy="240" r="7" fill="#a366ff" />
    <circle cx="660" cy="310" r="9" fill="#7000ff" />
    <circle cx="580" cy="330" r="6" fill="#7000ff" />
  </g>

  <!-- Title & Branding -->
  <g transform="translate(600, 160)" text-anchor="middle">
    <!-- Main Title -->
    <text class="title-text" y="0" font-size="44" filter="url(#glow)">AWESOME CLUSTERING ALGORITHMS</text>
    <!-- Subtitle -->
    <text class="subtitle-text" y="45" font-size="18">A Curated Progression of Machine Learning Grouping Paradigms</text>
  </g>
</svg>
